<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chorigrill 🔥</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; }
        h1 { text-align: center; color: #ff9800; margin-top: 20px; text-transform: uppercase; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        input, select { 
            width: 100%; padding: 14px; margin-top: 8px; background: #111; 
            border: 2px solid #ff9800; color: white; font-size: 16px; border-radius: 10px; box-sizing: border-box;
        }

        .btn-enviar { 
            width: 100%; padding: 15px; font-size: 18px; border-radius: 12px; margin-top: 15px; 
            cursor: pointer; font-weight: bold; border: none; background: #ff9800; color: black;
        }

        h2 { text-align: center; color: #ff9800; margin-top: 30px; }
        
        ul { list-style: none; padding: 15px; max-width: 500px; margin: auto; }
        
        /* TARJETA DE PEDIDO */
        li { 
            background: #111; border: 2px solid #ff9800; margin-bottom: 20px; 
            padding: 18px; border-radius: 20px; color: white;
            position: relative;
        }
        
        /* RESALTADO AUTOMÁTICO DEL PRIMER PEDIDO */
        li:first-child { 
            background: #fff9c4 !important; 
            color: #333 !important;
            border: 2px solid #fff9c4 !important;
        }
        
        li:first-child b, li:first-child span, li:first-child .total-box, li:first-child .fecha-esquina { 
            color: #000 !important; 
        }

        /* FECHA EN LA ESQUINA DERECHA */
        .fecha-esquina {
            position: absolute;
            top: 18px;
            right: 18px;
            font-size: 13px;
            color: #bbb;
        }

        .pedido-info { font-size: 16px; margin-bottom: 5px; width: 75%; }
        .item-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 16px; }
        .divider { border-top: 1px solid #444; margin: 10px 0; }
        li:first-child .divider { border-top: 1px solid rgba(0,0,0,0.1); }
        .total-box { font-size: 18px; font-weight: bold; }

        /* BOTONES EN FILA */
        .botones-fila { display: flex; gap: 10px; margin-top: 15px; }
        .btn-accion { 
            flex: 1; padding: 12px; border-radius: 10px; border: none; 
            font-weight: bold; font-size: 16px; cursor: pointer; color: white;
        }
        .btn-listo { background: #28a745; }
        .btn-cancelar { background: #dc3545; }
    </style>
</head>
<body>

<h1>🔥 Chorigrill</h1>

<div class="container">
    <input id="nombre" placeholder="Nombre del cliente">
    <input id="direccion" placeholder="Dirección (opcional)">
    <input type="number" id="pechuga" placeholder="Cantidad Pechuga" inputmode="numeric">
    <input type="number" id="carne" placeholder="Cantidad Carne" inputmode="numeric">
    <input type="number" id="lomo" placeholder="Cantidad Lomo" inputmode="numeric">
    <input type="number" id="sopa" placeholder="Cantidad Sopa" inputmode="numeric">
    <input type="number" id="arroz" placeholder="Cantidad Arroz" inputmode="numeric">
    <input type="number" id="bebida" placeholder="Precio Bebida" inputmode="numeric">
    <select id="tipo">
        <option value="Aquí">Para comer aquí</option>
        <option value="Llevar">Para llevar (Envío Gratis)</option>
    </select>
    <button class="btn-enviar" id="btnEnviar" onclick="agregarPedido()">ENVIAR PEDIDO</button>
</div>

<h2>Pedidos Activos</h2>
<ul id="lista"></ul>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
        authDomain: "chorigrill-9d0e9.firebaseapp.com",
        projectId: "chorigrill-9d0e9",
        storageBucket: "chorigrill-9d0e9.firebasestorage.app",
        messagingSenderId: "548842416171",
        appId: "1:548842416171:web:8ccb91cec236faa957226e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const pedidosRef = collection(db, "pedidos");

    let nroSiguiente = 1;

    onSnapshot(query(pedidosRef, orderBy("timestamp", "asc")), (snap) => {
        const lista = document.getElementById("lista");
        let html = "";
        
        if (!snap.empty) {
            nroSiguiente = snap.docs[snap.docs.length - 1].data().numero + 1;
        } else {
            nroSiguiente = 1;
        }

        snap.forEach((d) => {
            const p = d.data();
            const itemsHtml = p.detalle.map(i => `
                <div class="item-row">
                    <span>${i.q}x ${i.n}</span>
                    <span>$${i.v}</span>
                </div>
            `).join('');

            html += `
                <li>
                    <div class="fecha-esquina">${p.fechaFormatted} | ${p.hora}</div>
                    <div class="pedido-info"><b>Pedido #${p.numero}</b></div>
                    <div class="pedido-info"><b>${p.nombre || 'Cliente'}</b> (${p.tipo})</div>
                    ${p.direccion ? `<div class="pedido-info"><i>${p.direccion}</i></div>` : ''}
                    <div style="margin-top:10px">${itemsHtml}</div>
                    <div class="divider"></div>
                    <div class="total-box">Total: $${p.total}</div>
                    <div class="botones-fila">
                        <button class="btn-accion btn-listo" onclick="finalizar('${d.id}')">LISTO</button>
                        <button class="btn-accion btn-cancelar" onclick="finalizar('${d.id}')">CANCELAR</button>
                    </div>
                </li>`;
        });
        lista.innerHTML = html;
    });

    window.agregarPedido = async function() {
        const btn = document.getElementById("btnEnviar");
        const val = (id) => document.getElementById(id).value;

        const detalle = [];
        const menu = [
            {id: "pechuga", n: "Pechuga", p: 12000},
            {id: "carne", n: "Carne", p: 12000},
            {id: "lomo", n: "Lomo", p: 12000},
            {id: "sopa", n: "Sopa", p: 4000},
            {id: "arroz", n: "Arroz", p: 1000}
        ];

        menu.forEach(item => {
            let q = Number(val(item.id));
            if(q > 0) detalle.push({ n: item.n, q: q, v: q * item.p });
        });

        if(Number(val("bebida")) > 0) detalle.push({ n: "Bebida", q: 1, v: Number(val("bebida")) });

        const total = detalle.reduce((acc, i) => acc + i.v, 0);
        if (total === 0) return alert("¡Agrega productos!");

        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        try {
            const ahora = new Date();
            const meses = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
            const fechaFormatted = `${ahora.getDate()}/${meses[ahora.getMonth()]}/${ahora.getFullYear()}`;
            const hora = ahora.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

            await addDoc(pedidosRef, {
                numero: nroSiguiente,
                nombre: val("nombre"),
                direccion: val("direccion"),
                tipo: document.getElementById("tipo").value,
                detalle: detalle,
                total: total,
                fechaFormatted: fechaFormatted,
                hora: hora,
                timestamp: Date.now()
            });

            document.querySelectorAll("input").forEach(i => i.value = "");
            document.getElementById("tipo").selectedIndex = 0;

        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "ENVIAR PEDIDO";
        }
    };

    window.finalizar = async (id) => {
        await deleteDoc(doc(db, "pedidos", id));
    };
</script>
</body>
</html>
