<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chorigrill 🔥</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; }
        h1 { text-align: center; color: orange; margin-top: 20px; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        input, select { 
            width: 100%; padding: 14px; margin-top: 8px; background: #111; 
            border: 2px solid orange; color: white; font-size: 16px; border-radius: 8px; box-sizing: border-box;
        }
        button { width: 100%; padding: 15px; font-size: 18px; border-radius: 10px; margin-top: 15px; cursor: pointer; font-weight: bold; border: none; }
        .enviar { background: orange; color: black; }
        .enviar:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .listo { background: green; color: white; margin-top: 10px; }
        .cancelar { background: red; color: white; margin-top: 5px; }
        ul { list-style: none; padding: 15px; max-width: 500px; margin: auto; }
        li { background: #111; border: 2px solid orange; margin-bottom: 15px; padding: 15px; border-radius: 12px; }
        .primero { background: orange; color: black; }
        .item-row { display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<h1>🔥 Chorigrill</h1>

<div class="container">
    <input id="nombre" placeholder="Nombre del cliente">
    <input id="direccion" placeholder="Dirección (opcional)">
    <input type="number" id="pechuga" placeholder="Cantidad Pechuga" inputmode="numeric">
    <input type="number" id="carne" placeholder="Cantidad Carne" inputmode="numeric">
    <input type="number" id="lomo" placeholder="Cantidad Lomo" inputmode="numeric">
    <input type="number" id="sopa" placeholder="Cantidad Sopa" inputmode="numeric">
    <input type="number" id="arroz" placeholder="Cantidad Arroz" inputmode="numeric">
    <input type="number" id="bebida" placeholder="Precio Bebida" inputmode="numeric">
    <select id="tipo">
        <option value="0">Aquí</option>
        <option value="3000">Para llevar (+3000)</option>
    </select>
    <button class="enviar" id="btnEnviar" onclick="agregarPedido()">ENVIAR PEDIDO</button>
</div>

<h2 style="text-align:center; color: orange;">Pedidos</h2>
<ul id="lista"></ul>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
        authDomain: "chorigrill-9d0e9.firebaseapp.com",
        projectId: "chorigrill-9d0e9",
        storageBucket: "chorigrill-9d0e9.firebasestorage.app",
        messagingSenderId: "548842416171",
        appId: "1:548842416171:web:8ccb91cec236faa957226e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const pedidosRef = collection(db, "pedidos");

    let contador = 1;

    // Escuchar pedidos
    onSnapshot(query(pedidosRef, orderBy("numero", "asc")), (snap) => {
        const lista = document.getElementById("lista");
        let html = "";
        if (!snap.empty) {
            contador = snap.docs[snap.docs.length - 1].data().numero + 1;
        }
        snap.forEach((d, index) => {
            const p = d.data();
            const items = p.detalle.map(i => `<div class="item-row"><span>${i.q}x ${i.n}</span><span>$${i.v}</span></div>`).join('');
            html += `
                <li class="${index === 0 ? 'primero' : ''}">
                    <b>Pedido #${p.numero}</b> - ${p.hora}<br>
                    ${p.nombre || 'Cliente'} ${p.direccion ? `<br>${p.direccion}` : ''}
                    <div>${items}</div>
                    <b>Total: $${p.total}</b><br>
                    <button class="listo" onclick="eliminar('${d.id}')">Listo</button>
                </li>`;
        });
        lista.innerHTML = html;
    });

    window.agregarPedido = async function() {
        const btn = document.getElementById("btnEnviar");
        const val = (id) => document.getElementById(id).value;

        const detalle = [];
        const agregar = (n, q, precio) => { if(q > 0) detalle.push({ n, q, v: q * precio }); };

        agregar("Pechuga", Number(val("pechuga")), 12000);
        agregar("Carne", Number(val("carne")), 12000);
        agregar("Lomo", Number(val("lomo")), 12000);
        agregar("Sopa", Number(val("sopa")), 4000);
        agregar("Arroz", Number(val("arroz")), 1000);
        if(Number(val("bebida")) > 0) detalle.push({ n: "Bebida", q: 1, v: Number(val("bebida")) });
        if(Number(val("tipo")) > 0) detalle.push({ n: "Extra", q: 1, v: Number(val("tipo")) });

        const total = detalle.reduce((acc, i) => acc + i.v, 0);
        if (total === 0) return alert("Agrega productos");

        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        try {
            await addDoc(pedidosRef, {
                numero: contador,
                nombre: val("nombre"),
                direccion: val("direccion"),
                detalle: detalle,
                total: total,
                hora: new Date().toLocaleTimeString()
            });
            // LIMPIAR CAMPOS
            document.querySelectorAll("input").forEach(i => i.value = "");
            document.getElementById("tipo").selectedIndex = 0;
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "ENVIAR PEDIDO";
        }
    };

    window.eliminar = async (id) => {
        await deleteDoc(doc(db, "pedidos", id));
    };
</script>
</body>
</html>
