<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chorigrill 🔥</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}

h1 {
  text-align: center;
  color: orange;
  font-size: 32px;
}

.container {
  padding: 15px;
}

/* Se eliminaron los bordes y fondos extra del bloque para evitar los recuadros dobles */
.bloque {
  margin: 10px 0;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  background: black;
  border: 2px solid orange;
  color: white;
  font-size: 16px;
  box-sizing: border-box; /* Asegura que el padding no desborde el ancho */
  border-radius: 5px;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  background: black;
  border: 2px solid orange;
  color: white;
  font-size: 16px;
  box-sizing: border-box;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  margin-top: 15px;
  cursor: pointer;
  font-weight: bold;
}

.enviar {
  background: orange;
  color: black;
}

.listo {
  background: green;
  color: white;
  margin-top: 5px;
}

.cancelar {
  background: red;
  color: white;
  margin-top: 5px;
}

ul {
  list-style: none;
  padding: 10px;
  margin: 0;
}

li {
  background: #111;
  border: 2px solid orange;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
}

.primero {
  background: #ffaa00; /* Un naranja un poco más suave */
  color: black;
}

.primero .ticket-line {
  border-color: black !important; /* Para que las líneas punteadas resalten en el primer pedido */
}
</style>
</head>

<body>

<h1>🔥 Chorigrill</h1>

<div class="container">

  <div class="bloque">
    <p id="info" style="text-align: center; font-weight: bold; color: orange; font-size: 18px; margin: 0;"></p>
  </div>

  <div class="bloque">
    <input id="nombre" placeholder="Nombre">
  </div>

  <div class="bloque">
    <input id="direccion" placeholder="Dirección (opcional)">
  </div>

  <div class="bloque">
    <input type="number" id="pechuga" placeholder="Pechuga ($12.000)">
    <input type="number" id="carne" placeholder="Carne ($12.000)">
    <input type="number" id="lomo" placeholder="Lomo ($12.000)">
    <input type="number" id="sopa" placeholder="Sopa ($4.000)">
    <input type="number" id="arroz" placeholder="Arroz ($1.000)">
  </div>

  <div class="bloque">
    <input type="number" id="bebida" placeholder="Bebida (Ingresar precio)">
  </div>

  <div class="bloque">
    <select id="tipo">
      <option value="0">Aquí</option>
      <option value="3000">Para llevar (+ extra $3.000)</option>
    </select>
  </div>

  <button class="enviar" onclick="agregarPedido()">Enviar Pedido</button>

</div>

<h2 style="text-align:center;">Pedidos Activos</h2>
<ul id="lista"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
  authDomain: "chorigrill-9d0e9.firebaseapp.com",
  projectId: "chorigrill-9d0e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Obtener número automático
async function generarNumero() {
  const snap = await getDocs(collection(db, "pedidos"));
  if (snap.empty) return 1;

  let max = 0;
  snap.forEach(d => {
    if (d.data().numero > max) max = d.data().numero;
  });

  return max + 1;
}

// Agregar pedido a la base de datos
window.agregarPedido = async function() {
  const numero = await generarNumero();

  const ahora = new Date();
  const fecha = ahora.toLocaleDateString();
  const hora = ahora.toLocaleTimeString();

  const nombre = document.getElementById("nombre").value;
  const direccion = document.getElementById("direccion").value;

  const p = Number(document.getElementById("pechuga").value) || 0;
  const c = Number(document.getElementById("carne").value) || 0;
  const l = Number(document.getElementById("lomo").value) || 0;
  const s = Number(document.getElementById("sopa").value) || 0;
  const a = Number(document.getElementById("arroz").value) || 0;
  const bebida = Number(document.getElementById("bebida").value) || 0;
  const extra = Number(document.getElementById("tipo").value);

  // Crear un arreglo con el detalle de los productos para la factura
  const detalle = [];
  if (p > 0) detalle.push({ nombre: "Pechuga", cant: p, precio: p * 12000 });
  if (c > 0) detalle.push({ nombre: "Carne", cant: c, precio: c * 12000 });
  if (l > 0) detalle.push({ nombre: "Lomo", cant: l, precio: l * 12000 });
  if (s > 0) detalle.push({ nombre: "Sopa", cant: s, precio: s * 4000 });
  if (a > 0) detalle.push({ nombre: "Arroz", cant: a, precio: a * 1000 });
  if (bebida > 0) detalle.push({ nombre: "Bebida", cant: 1, precio: bebida });
  if (extra > 0) detalle.push({ nombre: "Empaque/Domicilio", cant: 1, precio: extra });

  // Calcular el total basado en los detalles
  const total = detalle.reduce((acc, item) => acc + item.precio, 0);

  // Solo enviar si hay un total mayor a 0 o un nombre (evita pedidos vacíos por error)
  if (total === 0 && !nombre) {
      alert("Por favor agrega al menos un producto o nombre al pedido.");
      return;
  }

  await addDoc(collection(db, "pedidos"), {
    numero, nombre, direccion,
    detalle, total, fecha, hora
  });

  // Limpiar campos después de enviar
  document.querySelectorAll("input").forEach(input => input.value = "");
  document.getElementById("tipo").value = "0";
};

// Eliminar / Completar pedido
window.eliminar = async function(id) {
  await deleteDoc(doc(db, "pedidos", id));
};

// Leer en tiempo real
onSnapshot(collection(db, "pedidos"), (snap) => {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let pedidos = [];

  snap.forEach(d => pedidos.push({ id: d.id, ...d.data() }));

  pedidos.sort((a,b)=>a.numero-b.numero);

  pedidos.forEach((p,i) => {
    
    // Construir la sección del recibo/factura
    let ticketHtml = "";
    if (p.detalle && p.detalle.length > 0) {
      ticketHtml += `<div class="ticket-line" style="border-top: 2px dashed gray; border-bottom: 2px dashed gray; margin: 10px 0; padding: 10px 0; font-family: monospace; font-size: 15px;">`;
      
      p.detalle.forEach(item => {
        ticketHtml += `
          <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span>${item.cant}x ${item.nombre}</span>
            <span>$${item.precio}</span>
          </div>
        `;
      });
      
      ticketHtml += `</div>`;
    }

    lista.innerHTML += `
      <li class="${i===0 ? 'primero' : ''}">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <b style="font-size: 20px;">Pedido #${p.numero}</b>
          <span style="font-size: 12px; opacity: 0.8;">${p.hora}</span>
        </div>
        
        <div style="margin-top: 5px;">
          ${p.nombre ? `<b>Cliente:</b> ${p.nombre}<br>` : ''}
          ${p.direccion ? `<b>Dir:</b> ${p.direccion}<br>` : ''}
        </div>

        ${ticketHtml}

        <div style="display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 15px;">
          <b>TOTAL:</b>
          <b>$${p.total}</b>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="listo" onclick="eliminar('${p.id}')">✔️ Listo</button>
            <button class="cancelar" onclick="eliminar('${p.id}')">❌ Cancelar</button>
        </div>
      </li>
    `;
  });

  document.getElementById("info").innerText =
    pedidos.length ? "Siguiente pedido #" + (pedidos[pedidos.length-1].numero + 1)
                   : "Siguiente pedido #1";
});
</script>

</body>
</html>
