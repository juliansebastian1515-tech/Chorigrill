<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CHORIGRILL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #111;
  color: white;
}

h2 {
  text-align: center;
}

.card {
  background: #1e1e1e;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

button {
  padding: 6px 10px;
  margin: 5px;
  border: none;
  border-radius: 5px;
}

input, select {
  width: 100%;
  margin: 5px 0;
  padding: 6px;
  border-radius: 5px;
  border: none;
}

.btn-add {
  background: green;
  color: white;
  width: 100%;
}

.btn-ok {
  background: #2ecc71;
  color: white;
}

.btn-cancel {
  background: red;
  color: white;
}
</style>
</head>

<body>

<h2>🔥 CHORIGRILL</h2>

<input placeholder="Nombre del cliente" id="cliente">

<input type="number" placeholder="Pechuga" id="pechuga">
<input type="number" placeholder="Carne Asada" id="carne">
<input type="number" placeholder="Lomo" id="lomo">
<input type="number" placeholder="Sopa" id="sopa">
<input type="number" placeholder="Arroz" id="arroz">

<!-- 🧃 NUEVO CAMPO BEBIDA -->
<input type="number" placeholder="Valor bebida" id="bebida">

<select id="tipo">
<option>Aquí</option>
<option>Para llevar</option>
</select>

<button class="btn-add" onclick="agregar()">Agregar Pedido</button>

<div id="lista"></div>

<script>
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];
let contador = pedidos.length > 0 ? Math.max(...pedidos.map(p => p.numero)) : 0;

// 💰 PRECIOS
const precios = {
  pechuga: 12000,
  carne: 12000,
  lomo: 12000,
  sopa: 4000,
  arroz: 1000
};

function guardar() {
  localStorage.setItem("pedidos", JSON.stringify(pedidos));
}

// 🕒 SOLO HORA
function obtenerHora() {
  const ahora = new Date();
  return ahora.toLocaleTimeString();
}

function agregar() {
  if (!cliente.value) {
    alert("Falta nombre del cliente");
    return;
  }

  contador++;

  const total =
    (pechuga.value * precios.pechuga) +
    (carne.value * precios.carne) +
    (lomo.value * precios.lomo) +
    (sopa.value * precios.sopa) +
    (arroz.value * precios.arroz) +
    (bebida.value ? parseInt(bebida.value) : 0); // 🧃 SUMA BEBIDA

  const pedido = {
    id: Date.now(),
    numero: contador,
    cliente: cliente.value,
    hora: obtenerHora(),
    tipo: tipo.value,
    pechuga: pechuga.value,
    carne: carne.value,
    lomo: lomo.value,
    sopa: sopa.value,
    arroz: arroz.value,
    bebida: bebida.value,
    total: total
  };

  pedidos.push(pedido);
  guardar();
  limpiar();
  mostrar();
}

function eliminar(id) {
  pedidos = pedidos.filter(p => p.id !== id);

  if (pedidos.length === 0) {
    contador = 0;
  }

  guardar();
  mostrar();
}

function limpiar() {
  document.querySelectorAll("input").forEach(i => i.value = "");
}

function mostrar() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  pedidos
  .sort((a, b) => a.id - b.id)
  .forEach((p, index) => {
    lista.innerHTML += `
    <div class="card" style="${index === 0 ? 'border: 2px solid yellow;' : ''}">
      <b>#${p.numero} - ${p.cliente}</b><br>
      🕒 ${p.hora}<br>
      Tipo: ${p.tipo}<br><br>

      ${p.pechuga > 0 ? "Pechuga: " + p.pechuga + "<br>" : ""}
      ${p.carne > 0 ? "Carne: " + p.carne + "<br>" : ""}
      ${p.lomo > 0 ? "Lomo: " + p.lomo + "<br>" : ""}
      ${p.sopa > 0 ? "Sopa: " + p.sopa + "<br>" : ""}
      ${p.arroz > 0 ? "Arroz: " + p.arroz + "<br>" : ""}
      ${p.bebida > 0 ? "Bebida: $" + p.bebida + "<br>" : ""}

      <br><b>Total: $${p.total}</b><br>

      <button class="btn-ok" onclick="eliminar(${p.id})">Listo</button>
      <button class="btn-cancel" onclick="eliminar(${p.id})">Cancelar</button>
    </div>
    `;
  });
}

mostrar();
</script>

</body>
</html>
