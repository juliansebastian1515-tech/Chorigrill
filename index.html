<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chorigrill 🔥</title>

<style>
body { margin: 0; font-family: sans-serif; background: #000; color: white; }
h1 { text-align: center; color: orange; margin-top: 20px; }
.container { padding: 15px; max-width: 500px; margin: auto; }

/* Eliminación de bordes exteriores (pedidos por el usuario) */
.bloque { margin-bottom: 10px; border: none; background: transparent; padding: 0; }

input, select {
  width: 100%; padding: 14px; margin-top: 8px;
  background: #111; border: 2px solid orange;
  color: white; font-size: 16px; border-radius: 8px;
  box-sizing: border-box; outline: none;
}

button {
  width: 100%; padding: 15px; font-size: 18px;
  border-radius: 10px; margin-top: 15px; cursor: pointer; font-weight: bold;
}

.enviar { background: orange; color: black; border: none; }
.listo { background: #28a745; color: white; flex: 1; border: none; }
.cancelar { background: #dc3545; color: white; flex: 1; border: none; }

ul { list-style: none; padding: 15px; max-width: 500px; margin: auto; }
li {
  background: #111; border: 2px solid orange;
  margin-bottom: 15px; padding: 15px; border-radius: 12px;
}

.primero { background: orange; color: black; }
.ticket { border-top: 1px dashed #555; border-bottom: 1px dashed #555; margin: 10px 0; padding: 8px 0; font-family: monospace; }
.item-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
</style>
</head>

<body>

<h1>🔥 Chorigrill</h1>

<div class="container" id="formulario">
  <p id="info" style="text-align: center; font-weight: bold; color: orange; font-size: 1.2em;"></p>

  <div class="bloque">
    <input id="nombre" type="text" placeholder="Nombre del cliente" autocomplete="off">
    <input id="direccion" type="text" placeholder="Dirección (opcional)" autocomplete="off">
  </div>

  <div class="bloque">
    <input type="number" id="pechuga" placeholder="Cantidad Pechuga ($12k)" min="0">
    <input type="number" id="carne" placeholder="Cantidad Carne ($12k)" min="0">
    <input type="number" id="lomo" placeholder="Cantidad Lomo ($12k)" min="0">
    <input type="number" id="sopa" placeholder="Cantidad Sopa ($4k)" min="0">
    <input type="number" id="arroz" placeholder="Cantidad Arroz ($1k)" min="0">
    <input type="number" id="bebida" placeholder="Precio de Bebida ($)" min="0">
  </div>

  <div class="bloque">
    <select id="tipo">
      <option value="0">Consumo en local (Aquí)</option>
      <option value="3000">Para llevar / Domicilio (+$3.000)</option>
    </select>
  </div>

  <button class="enviar" id="btnEnviar" onclick="agregarPedido()">ENVIAR PEDIDO</button>
</div>

<h2 style="text-align:center; color: orange;">Pedidos en Cocina</h2>
<ul id="lista"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
  authDomain: "chorigrill-9d0e9.firebaseapp.com",
  projectId: "chorigrill-9d0e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// FUNCIÓN CLAVE: Limpieza total forzada
function resetearTodo() {
    const campos = ["nombre", "direccion", "pechuga", "carne", "lomo", "sopa", "arroz", "bebida"];
    campos.forEach(id => {
        const el = document.getElementById(id);
        el.value = ""; // Borra el contenido
        el.defaultValue = ""; // Resetea el valor interno del DOM
    });
    document.getElementById("tipo").selectedIndex = 0;
    console.log("Formulario limpiado");
}

async function obtenerSiguienteNumero() {
  const snap = await getDocs(collection(db, "pedidos"));
  let max = 0;
  snap.forEach(d => { if (d.data().numero > max) max = d.data().numero; });
  return max + 1;
}

window.agregarPedido = async function() {
  const btn = document.getElementById("btnEnviar");
  const nombreCli = document.getElementById("nombre").value;
  
  btn.disabled = true;
  btn.innerText = "PROCESANDO...";

  const p = Number(document.getElementById("pechuga").value) || 0;
  const c = Number(document.getElementById("carne").value) || 0;
  const l = Number(document.getElementById("lomo").value) || 0;
  const s = Number(document.getElementById("sopa").value) || 0;
  const a = Number(document.getElementById("arroz").value) || 0;
  const b = Number(document.getElementById("bebida").value) || 0;
  const extra = Number(document.getElementById("tipo").value);

  const detalle = [];
  if (p > 0) detalle.push({ n: "Pechuga", q: p, v: p * 12000 });
  if (c > 0) detalle.push({ n: "Carne", q: c, v: c * 12000 });
  if (l > 0) detalle.push({ n: "Lomo", q: l, v: l * 12000 });
  if (s > 0) detalle.push({ n: "Sopa", q: s, v: s * 4000 });
  if (a > 0) detalle.push({ n: "Arroz", q: a, v: a * 1000 });
  if (b > 0) detalle.push({ n: "Bebida", q: 1, v: b });
  if (extra > 0) detalle.push({ n: "Domicilio/Empaque", q: 1, v: extra });

  const total = detalle.reduce((acc, i) => acc + i.v, 0);

  if (total === 0) {
      alert("Agrega productos al pedido.");
      btn.disabled = false;
      btn.innerText = "ENVIAR PEDIDO";
      return;
  }

  const numero = await obtenerSiguienteNumero();
  const ahora = new Date();

  try {
    await addDoc(collection(db, "pedidos"), {
      numero,
      nombre: nombreCli,
      direccion: document.getElementById("direccion").value,
      detalle,
      total,
      fecha: ahora.toLocaleDateString(),
      hora: ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });

    resetearTodo(); // SE LLAMA AQUÍ DESPUÉS DEL ÉXITO
    
  } catch (error) {
    alert("Error al enviar: " + error.message);
  } finally {
    btn.disabled = false;
    btn.innerText = "ENVIAR PEDIDO";
  }
};

window.eliminar = async (id) => await deleteDoc(doc(db, "pedidos", id));

// Renderizado rápido
const q = query(collection(db, "pedidos"), orderBy("numero", "asc"));
onSnapshot(q, (snap) => {
  const lista = document.getElementById("lista");
  let listadoHtml = "";
  
  snap.forEach((d) => {
    const p = d.data();
    const items = p.detalle.map(i => `
      <div class="item-row">
        <span>${i.q}x ${i.n}</span>
        <span>$${i.v.toLocaleString()}</span>
      </div>
    `).join('');

    listadoHtml += `
      <li class="${listadoHtml === "" ? 'primero' : ''}">
        <b>Pedido #${p.numero}</b> - <small>${p.hora}</small><br>
        ${p.nombre ? `Cliente: ${p.nombre}<br>` : ''}
        ${p.direccion ? `Dir: ${p.direccion}<br>` : ''}
        <div class="ticket">${items}</div>
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.1em;">
          <span>TOTAL:</span><span>$${p.total.toLocaleString()}</span>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="listo" onclick="eliminar('${d.id}')">Listo</button>
          <button class="cancelar" onclick="eliminar('${d.id}')">Borrar</button>
        </div>
      </li>
    `;
  });
  
  lista.innerHTML = listadoHtml;
  const sig = snap.empty ? 1 : snap.docs[snap.docs.length-1].data().numero + 1;
  document.getElementById("info").innerText = "SIGUIENTE: #" + sig;
});
</script>

</body>
</html>
