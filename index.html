<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chorigrill 🔥</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 10px;
}

.container {
  background: #fff;
  color: black;
  width: 320px;
  margin: auto;
  padding: 15px;
  border-radius: 10px;
}

input {
  width: 90%;
  padding: 8px;
  margin: 5px;
}

select {
  padding: 6px;
  margin: 5px;
}

button {
  padding: 8px;
  margin: 5px;
  cursor: pointer;
}

.enviar {
  background: green;
  color: white;
}

.listo { background: green; color: white; }
.cancelar { background: red; color: white; }

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #222;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.primero {
  background: yellow;
  color: black;
}
</style>
</head>

<body>

<h1>Chorigrill 🔥</h1>

<div class="container">

<p id="info"></p>

<input id="nombre" placeholder="Nombre">
<input id="direccion" placeholder="Dirección (opcional)">

<br>

<input type="number" id="pechuga" placeholder="Pechuga">
<input type="number" id="carne" placeholder="Carne">
<input type="number" id="lomo" placeholder="Lomo">
<input type="number" id="sopa" placeholder="Sopa">
<input type="number" id="arroz" placeholder="Arroz">

<br>

<select id="tipo">
  <option value="0">Aquí</option>
  <option value="3000">Para llevar (+ bebida)</option>
</select>

<br>

<button class="enviar" onclick="agregarPedido()">Enviar Pedido</button>

</div>

<h2>Pedidos</h2>
<ul id="lista"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
  authDomain: "chorigrill-9d0e9.firebaseapp.com",
  projectId: "chorigrill-9d0e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 número automático
async function generarNumero() {
  const snap = await getDocs(collection(db, "pedidos"));
  if (snap.empty) return 1;

  let max = 0;
  snap.forEach(d => {
    if (d.data().numero > max) max = d.data().numero;
  });

  return max + 1;
}

// 🔥 agregar pedido
window.agregarPedido = async function() {
  const numero = await generarNumero();

  const ahora = new Date();
  const fecha = ahora.toLocaleDateString();
  const hora = ahora.toLocaleTimeString();

  const nombre = document.getElementById("nombre").value;
  const direccion = document.getElementById("direccion").value;

  const p = Number(document.getElementById("pechuga").value) || 0;
  const c = Number(document.getElementById("carne").value) || 0;
  const l = Number(document.getElementById("lomo").value) || 0;
  const s = Number(document.getElementById("sopa").value) || 0;
  const a = Number(document.getElementById("arroz").value) || 0;
  const extra = Number(document.getElementById("tipo").value);

  const total =
    (p * 12000) +
    (c * 12000) +
    (l * 12000) +
    (s * 4000) +
    (a * 1000) +
    extra;

  await addDoc(collection(db, "pedidos"), {
    numero, nombre, direccion,
    p, c, l, s, a,
    total,
    fecha,
    hora
  });
};

// 🔥 eliminar
window.eliminar = async function(id) {
  await deleteDoc(doc(db, "pedidos", id));
};

// 🔥 tiempo real
onSnapshot(collection(db, "pedidos"), (snap) => {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let pedidos = [];

  snap.forEach(d => pedidos.push({ id: d.id, ...d.data() }));

  pedidos.sort((a,b)=>a.numero-b.numero);

  pedidos.forEach((p,i) => {
    lista.innerHTML += `
      <li class="${i===0?'primero':''}">
        <b>#${p.numero}</b> - ${p.nombre || ''}<br>
        ${p.fecha} ${p.hora}<br>
        Total: $${p.total}<br><br>

        <button class="listo" onclick="eliminar('${p.id}')">Listo</button>
        <button class="cancelar" onclick="eliminar('${p.id}')">Cancelar</button>
      </li>
    `;
  });

  document.getElementById("info").innerText =
    pedidos.length ? "Pedido #" + (pedidos[pedidos.length-1].numero + 1)
                   : "Pedido #1";
});
</script>

</body>
</html>
