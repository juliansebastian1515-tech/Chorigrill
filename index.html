<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chorigrill 🔥</title>

<style>
body { margin: 0; font-family: sans-serif; background: #000; color: white; }
h1 { text-align: center; color: orange; margin-top: 20px; }
.container { padding: 15px; max-width: 500px; margin: auto; }

.bloque { margin-bottom: 10px; }

input, select {
  width: 100%; padding: 14px; margin-top: 8px;
  background: #111; border: 2px solid orange;
  color: white; font-size: 16px; border-radius: 8px;
  box-sizing: border-box; outline: none;
}

button {
  width: 100%; padding: 15px; font-size: 18px;
  border-radius: 10px; margin-top: 15px; cursor: pointer; font-weight: bold;
}

.enviar { background: orange; color: black; border: none; }
.listo { background: #28a745; color: white; flex: 1; border: none; }
.cancelar { background: #dc3545; color: white; flex: 1; border: none; }

ul { list-style: none; padding: 15px; max-width: 500px; margin: auto; }
li {
  background: #111; border: 2px solid orange;
  margin-bottom: 15px; padding: 15px; border-radius: 12px;
}

.primero { background: orange; color: black; }
.ticket { border-top: 1px dashed #555; border-bottom: 1px dashed #555; margin: 10px 0; padding: 8px 0; font-family: monospace; }
.item-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
</style>
</head>

<body>

<h1>🔥 Chorigrill</h1>

<div class="container">
  <p id="info" style="text-align: center; font-weight: bold; color: orange; font-size: 1.2em;"></p>

  <div class="bloque">
    <input id="nombre" type="text" placeholder="Nombre del cliente" autocomplete="off">
    <input id="direccion" type="text" placeholder="Dirección (opcional)" autocomplete="off">
  </div>

  <div class="bloque">
    <input type="number" id="pechuga" placeholder="Cantidad Pechuga ($12k)">
    <input type="number" id="carne" placeholder="Cantidad Carne ($12k)">
    <input type="number" id="lomo" placeholder="Cantidad Lomo ($12k)">
    <input type="number" id="sopa" placeholder="Cantidad Sopa ($4k)">
    <input type="number" id="arroz" placeholder="Cantidad Arroz ($1k)">
    <input type="number" id="bebida" placeholder="Precio de Bebida">
  </div>

  <div class="bloque">
    <select id="tipo">
      <option value="0">Aquí</option>
      <option value="3000">Para llevar (+$3.000)</option>
    </select>
  </div>

  <button class="enviar" id="btnEnviar" onclick="agregarPedido()">ENVIAR PEDIDO</button>
</div>

<h2 style="text-align:center; color: orange;">Pedidos</h2>
<ul id="lista"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
  authDomain: "chorigrill-9d0e9.firebaseapp.com",
  projectId: "chorigrill-9d0e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 CONTADOR EN TIEMPO REAL (RÁPIDO)
let contador = 1;

const q = query(collection(db, "pedidos"), orderBy("numero", "asc"));

onSnapshot(q, (snap) => {
  const lista = document.getElementById("lista");
  let html = "";

  if (snap.empty) {
    contador = 1;
  } else {
    const ultimo = snap.docs[snap.docs.length - 1].data().numero;
    contador = ultimo + 1;
  }

  snap.forEach((d, index) => {
    const p = d.data();

    const items = p.detalle.map(i => `
      <div class="item-row">
        <span>${i.q}x ${i.n}</span>
        <span>$${i.v.toLocaleString()}</span>
      </div>
    `).join('');

    html += `
      <li class="${index === 0 ? 'primero' : ''}">
        <b>Pedido #${p.numero}</b> - ${p.hora}<br>
        ${p.nombre ? `Cliente: ${p.nombre}<br>` : ''}
        ${p.direccion ? `Dir: ${p.direccion}<br>` : ''}

        <div class="ticket">${items}</div>

        <b>Total: $${p.total.toLocaleString()}</b>

        <div style="display:flex; gap:10px; margin-top:10px;">
          <button class="listo" onclick="eliminar('${d.id}')">Listo</button>
          <button class="cancelar" onclick="eliminar('${d.id}')">Cancelar</button>
        </div>
      </li>
    `;
  });

  lista.innerHTML = html;
  document.getElementById("info").innerText = "SIGUIENTE: #" + contador;
});

// 🧹 LIMPIAR
function limpiar() {
  ["nombre","direccion","pechuga","carne","lomo","sopa","arroz","bebida"]
  .forEach(id => document.getElementById(id).value = "");

  document.getElementById("tipo").selectedIndex = 0;
  document.activeElement.blur();
}

// 🚀 AGREGAR PEDIDO RÁPIDO
window.agregarPedido = async function() {
  const btn = document.getElementById("btnEnviar");
  btn.disabled = true;
  btn.innerText = "ENVIANDO...";
  btn.style.opacity = "0.6";

  const p = Number(pechuga.value) || 0;
  const c = Number(carne.value) || 0;
  const l = Number(lomo.value) || 0;
  const s = Number(sopa.value) || 0;
  const a = Number(arroz.value) || 0;
  const b = Number(bebida.value) || 0;
  const extra = Number(tipo.value);

  const detalle = [];

  if (p) detalle.push({ n: "Pechuga", q: p, v: p * 12000 });
  if (c) detalle.push({ n: "Carne", q: c, v: c * 12000 });
  if (l) detalle.push({ n: "Lomo", q: l, v: l * 12000 });
  if (s) detalle.push({ n: "Sopa", q: s, v: s * 4000 });
  if (a) detalle.push({ n: "Arroz", q: a, v: a * 1000 });
  if (b) detalle.push({ n: "Bebida", q: 1, v: b });
  if (extra) detalle.push({ n: "Domicilio", q: 1, v: extra });

  const total = detalle.reduce((acc, i) => acc + i.v, 0);

  if (!total) {
    alert("Agrega productos");
    btn.disabled = false;
    btn.innerText = "ENVIAR PEDIDO";
    btn.style.opacity = "1";
    return;
  }

  const ahora = new Date();

  await addDoc(collection(db, "pedidos"), {
    numero: contador,
    nombre: nombre.value,
    direccion: direccion.value,
    detalle,
    total,
    fecha: ahora.toLocaleDateString(),
    hora: ahora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  });

  limpiar();

  btn.disabled = false;
  btn.innerText = "ENVIAR PEDIDO";
  btn.style.opacity = "1";
};

// eliminar
window.eliminar = async (id) => await deleteDoc(doc(db, "pedidos", id));

</script>

</body>
</html>
