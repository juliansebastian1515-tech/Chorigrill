<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
    authDomain: "chorigrill-9d0e9.firebaseapp.com",
    projectId: "chorigrill-9d0e9",
    storageBucket: "chorigrill-9d0e9.firebasestorage.app",
    messagingSenderId: "548842416171",
    appId: "1:548842416171:web:8ccb91cec236faa957226e",
    measurementId: "G-E5WDR5Y0MM"
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔥 GUARDAR PEDIDO
  window.guardarPedido = async function(pedido) {
    await addDoc(collection(db, "pedidos"), pedido);
  };

  // 🔥 ESCUCHAR PEDIDOS EN TIEMPO REAL
  onSnapshot(collection(db, "pedidos"), (snapshot) => {
    const pedidos = [];
    snapshot.forEach(doc => {
      pedidos.push({ id: doc.id, ...doc.data() });
    });

    console.log("Pedidos en vivo:", pedidos);

    // Aquí puedes mostrarlo en tu HTML
    const lista = document.getElementById("listaPedidos");
    if (lista) {
      lista.innerHTML = "";
      pedidos.forEach(p => {
        lista.innerHTML += `<li>${p.nombre} - $${p.total}</li>`;
      });
    }
  });
</script>
