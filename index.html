<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chorigrill 🔥</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #000;
  color: white;
}

h1 {
  text-align: center;
  color: orange;
  font-size: 32px;
  margin-top: 20px;
}

.container {
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

/* Eliminamos recuadros exteriores para un look más limpio */
.bloque {
  margin-bottom: 10px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: #111;
  border: 1.5px solid orange;
  color: white;
  font-size: 16px;
  box-sizing: border-box;
  border-radius: 8px;
  outline: none;
}

input:focus {
  border-color: #ffaa00;
  background: #1a1a1a;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  margin-top: 15px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.enviar {
  background: orange;
  color: black;
}

.enviar:active {
  transform: scale(0.98);
}

.listo { background: #28a745; color: white; flex: 1; }
.cancelar { background: #dc3545; color: white; flex: 1; }

ul {
  list-style: none;
  padding: 15px;
  max-width: 500px;
  margin: auto;
}

li {
  background: #111;
  border: 2px solid orange;
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 12px;
  animation: fadeIn 0.3s ease-in;
}

.primero {
  background: orange;
  color: black;
}

.primero b, .primero span { color: black; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.ticket {
  border-top: 1px dashed #555;
  border-bottom: 1px dashed #555;
  margin: 10px 0;
  padding: 8px 0;
  font-family: monospace;
}

.primero .ticket { border-color: black; }

.item-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}
</style>
</head>

<body>

<h1>🔥 Chorigrill</h1>

<div class="container">
  <p id="info" style="text-align: center; font-weight: bold; color: orange;"></p>

  <div class="bloque">
    <input id="nombre" placeholder="Nombre del cliente">
    <input id="direccion" placeholder="Dirección (opcional)">
  </div>

  <div class="bloque">
    <input type="number" id="pechuga" placeholder="Cantidad Pechuga ($12k)">
    <input type="number" id="carne" placeholder="Cantidad Carne ($12k)">
    <input type="number" id="lomo" placeholder="Cantidad Lomo ($12k)">
    <input type="number" id="sopa" placeholder="Cantidad Sopa ($4k)">
    <input type="number" id="arroz" placeholder="Cantidad Arroz ($1k)">
    <input type="number" id="bebida" placeholder="Precio de Bebida ($)">
  </div>

  <div class="bloque">
    <select id="tipo">
      <option value="0">Consumo en local (Aquí)</option>
      <option value="3000">Para llevar / Domicilio (+$3.000)</option>
    </select>
  </div>

  <button class="enviar" onclick="agregarPedido()">ENVIAR PEDIDO</button>
</div>

<h2 style="text-align:center; color: orange;">Pedidos Pendientes</h2>
<ul id="lista"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
  authDomain: "chorigrill-9d0e9.firebaseapp.com",
  projectId: "chorigrill-9d0e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Función para limpiar todos los campos
function limpiarFormulario() {
    const ids = ["nombre", "direccion", "pechuga", "carne", "lomo", "sopa", "arroz", "bebida"];
    ids.forEach(id => document.getElementById(id).value = "");
    document.getElementById("tipo").value = "0";
}

async function generarNumero() {
  const snap = await getDocs(collection(db, "pedidos"));
  if (snap.empty) return 1;
  let max = 0;
  snap.forEach(d => { if (d.data().numero > max) max = d.data().numero; });
  return max + 1;
}

window.agregarPedido = async function() {
  const btn = document.querySelector(".enviar");
  btn.disabled = true; // Evita doble clic
  btn.innerText = "Enviando...";

  const numero = await generarNumero();
  const ahora = new Date();
  
  const datos = {
    nombre: document.getElementById("nombre").value,
    direccion: document.getElementById("direccion").value,
    p: Number(document.getElementById("pechuga").value) || 0,
    c: Number(document.getElementById("carne").value) || 0,
    l: Number(document.getElementById("lomo").value) || 0,
    s: Number(document.getElementById("sopa").value) || 0,
    a: Number(document.getElementById("arroz").value) || 0,
    bebida: Number(document.getElementById("bebida").value) || 0,
    extra: Number(document.getElementById("tipo").value)
  };

  const detalle = [];
  if (datos.p > 0) detalle.push({ n: "Pechuga", q: datos.p, v: datos.p * 12000 });
  if (datos.c > 0) detalle.push({ n: "Carne", q: datos.c, v: datos.c * 12000 });
  if (datos.l > 0) detalle.push({ n: "Lomo", q: datos.l, v: datos.l * 12000 });
  if (datos.s > 0) detalle.push({ n: "Sopa", q: datos.s, v: datos.s * 4000 });
  if (datos.a > 0) detalle.push({ n: "Arroz", q: datos.a, v: datos.a * 1000 });
  if (datos.bebida > 0) detalle.push({ n: "Bebida", q: 1, v: datos.bebida });
  if (datos.extra > 0) detalle.push({ n: "Empaque/Dom", q: 1, v: datos.extra });

  const total = detalle.reduce((acc, item) => acc + item.v, 0);

  if (total === 0 && !datos.nombre) {
      alert("Pedido vacío");
      btn.disabled = false;
      btn.innerText = "ENVIAR PEDIDO";
      return;
  }

  try {
    await addDoc(collection(db, "pedidos"), {
      numero, 
      nombre: datos.nombre, 
      direccion: datos.direccion,
      detalle, 
      total, 
      fecha: ahora.toLocaleDateString(), 
      hora: ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });
    
    limpiarFormulario(); // <-- Aquí se limpian los campos al terminar
  } catch (e) {
    console.error("Error: ", e);
  } finally {
    btn.disabled = false;
    btn.innerText = "ENVIAR PEDIDO";
  }
};

window.eliminar = async (id) => await deleteDoc(doc(db, "pedidos", id));

// Optimización: Escucha en tiempo real con orden eficiente
const q = query(collection(db, "pedidos"), orderBy("numero", "asc"));

onSnapshot(q, (snap) => {
  const lista = document.getElementById("lista");
  let htmlFinal = ""; // Construimos todo el string primero (más rápido)

  snap.forEach((d) => {
    const p = d.data();
    const esPrimero = lista.children.length === 0 && htmlFinal === "";
    
    let itemsHtml = p.detalle.map(item => `
      <div class="item-row">
        <span>${item.q}x ${item.n}</span>
        <span>$${item.v.toLocaleString()}</span>
      </div>
    `).join('');

    htmlFinal += `
      <li class="${esPrimero ? 'primero' : ''}">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <b style="font-size:1.2em;">Pedido #${p.numero}</b>
          <span style="font-size:0.85em;">${p.hora}</span>
        </div>
        
        <div style="margin: 8px 0;">
          ${p.nombre ? `<b>Cliente:</b> ${p.nombre}<br>` : ''}
          ${p.direccion ? `<b>Dir:</b> ${p.direccion}` : ''}
        </div>

        <div class="ticket">${itemsHtml}</div>

        <div style="display:flex; justify-content:space-between; font-size:1.2em; font-weight:bold;">
          <span>TOTAL:</span>
          <span>$${p.total.toLocaleString()}</span>
        </div>

        <div style="display:flex; gap:10px; margin-top:15px;">
          <button class="listo" onclick="eliminar('${d.id}')">✔️ Listo</button>
          <button class="cancelar" onclick="eliminar('${d.id}')">❌ Borrar</button>
        </div>
      </li>
    `;
  });

  lista.innerHTML = htmlFinal; // Inyectamos todo de una sola vez
  
  const ultimoNum = snap.empty ? 0 : snap.docs[snap.docs.length-1].data().numero;
  document.getElementById("info").innerText = "Siguiente pedido #" + (ultimoNum + 1);
});
</script>

</body>
</html>
