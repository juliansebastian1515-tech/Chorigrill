<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chorigrill 🔥</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; }
        h1 { text-align: center; color: #ff9800; margin-top: 20px; font-weight: bold; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        
        input, select { 
            width: 100%; padding: 14px; margin-top: 8px; background: #111; 
            border: 2px solid #ff9800; color: white; font-size: 16px; border-radius: 10px; box-sizing: border-box;
        }

        .btn-enviar { 
            width: 100%; padding: 15px; font-size: 18px; border-radius: 12px; margin-top: 15px; 
            cursor: pointer; font-weight: bold; border: none; background: #888; color: white;
        }
        .btn-enviar.activo { background: #ff9800; color: black; }
        .btn-enviar:disabled { background: #444; color: #888; cursor: not-allowed; }

        h2 { text-align: center; color: #ff9800; margin-top: 30px; }
        
        /* LISTA DE PEDIDOS - ESTILO DE LA FOTO */
        ul { list-style: none; padding: 15px; max-width: 500px; margin: auto; }
        li { 
            background: #111; border: 2px solid #ff9800; margin-bottom: 20px; 
            padding: 18px; border-radius: 20px; color: white;
        }
        
        /* RESALTADO AMARILLO PARA EL PRIMER PEDIDO */
        li.primero { 
            background: #ffc107; /* Amarillo de la foto */
            color: black; 
            border: 2px solid #ffc107;
        }
        li.primero b, li.primero span, li.primero .total-box { color: black; }

        .pedido-info { font-size: 16px; margin-bottom: 5px; }
        .item-row { display: flex; justify-content: space-between; margin: 4px 0; font-size: 16px; }
        
        .divider { border-top: 1px solid #444; margin: 10px 0; }
        li.primero .divider { border-top: 1px solid rgba(0,0,0,0.2); }

        .total-box { font-size: 18px; font-weight: bold; }

        /* BOTONES LISTO Y CANCELAR */
        .btn-listo { background: #008000; color: white; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; margin-top: 10px; cursor: pointer; }
        .btn-cancelar { background: #ff0000; color: white; width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<h1>🔥 Chorigrill</h1>

<div class="container">
    <input id="nombre" placeholder="Nombre del cliente">
    <input id="direccion" placeholder="Dirección (opcional)">
    <input type="number" id="pechuga" placeholder="Cantidad Pechuga" inputmode="numeric">
    <input type="number" id="carne" placeholder="Cantidad Carne" inputmode="numeric">
    <input type="number" id="lomo" placeholder="Cantidad Lomo" inputmode="numeric">
    <input type="number" id="sopa" placeholder="Cantidad Sopa" inputmode="numeric">
    <input type="number" id="arroz" placeholder="Cantidad Arroz" inputmode="numeric">
    <input type="number" id="bebida" placeholder="Precio Bebida" inputmode="numeric">
    <select id="tipo">
        <option value="0">Aquí</option>
        <option value="3000">Para llevar (+3000)</option>
    </select>
    <button class="btn-enviar activo" id="btnEnviar" onclick="agregarPedido()">ENVIAR PEDIDO</button>
</div>

<h2>Pedidos</h2>
<ul id="lista"></ul>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
        authDomain: "chorigrill-9d0e9.firebaseapp.com",
        projectId: "chorigrill-9d0e9",
        storageBucket: "chorigrill-9d0e9.firebasestorage.app",
        messagingSenderId: "548842416171",
        appId: "1:548842416171:web:8ccb91cec236faa957226e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const pedidosRef = collection(db, "pedidos");

    let nroSiguiente = 1;

    // ESCUCHAR EN TIEMPO REAL
    onSnapshot(query(pedidosRef, orderBy("timestamp", "asc")), (snap) => {
        const lista = document.getElementById("lista");
        let html = "";
        
        if (!snap.empty) {
            const docs = snap.docs;
            nroSiguiente = docs[docs.length - 1].data().numero + 1;
        } else {
            nroSiguiente = 1;
        }

        snap.forEach((d, index) => {
            const p = d.data();
            const esPrimero = index === 0 ? 'primero' : ''; // RESALTADO AMARILLO SI ES EL 0
            
            const itemsHtml = p.detalle.map(i => `
                <div class="item-row">
                    <span>${i.q}x ${i.n}</span>
                    <span>$${i.v}</span>
                </div>
            `).join('');

            html += `
                <li class="${esPrimero}">
                    <div class="pedido-info"><b>Pedido #${p.numero}</b> - ${p.fecha} | ${p.hora}</div>
                    <div class="pedido-info"><b>${p.nombre || 'Cliente'}</b></div>
                    ${p.direccion ? `<div class="pedido-info"><i>${p.direccion}</i></div>` : ''}
                    <div style="margin-top:10px">${itemsHtml}</div>
                    <div class="divider"></div>
                    <div class="total-box">Total: $${p.total}</div>
                    <button class="btn-listo" onclick="finalizar('${d.id}')">Listo</button>
                    <button class="btn-cancelar" onclick="finalizar('${d.id}')">Cancelar</button>
                </li>`;
        });
        lista.innerHTML = html;
    });

    window.agregarPedido = async function() {
        const btn = document.getElementById("btnEnviar");
        const val = (id) => document.getElementById(id).value;

        const detalle = [];
        const menu = [
            {id: "pechuga", n: "Pechuga", p: 12000},
            {id: "carne", n: "Carne", p: 12000},
            {id: "lomo", n: "Lomo", p: 12000},
            {id: "sopa", n: "Sopa", p: 4000},
            {id: "arroz", n: "Arroz", p: 1000}
        ];

        menu.forEach(item => {
            let q = Number(val(item.id));
            if(q > 0) detalle.push({ n: item.n, q: q, v: q * item.p });
        });

        if(Number(val("bebida")) > 0) detalle.push({ n: "Bebida", q: 1, v: Number(val("bebida")) });
        if(Number(val("tipo")) > 0) detalle.push({ n: "Domi/Llevar", q: 1, v: Number(val("tipo")) });

        const total = detalle.reduce((acc, i) => acc + i.v, 0);
        if (total === 0) return alert("¡Pedido vacío!");

        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        try {
            const ahora = new Date();
            // FECHA Y HORA 12H (AM/PM)
            const fecha = ahora.toLocaleDateString();
            const hora = ahora.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

            await addDoc(pedidosRef, {
                numero: nroSiguiente,
                nombre: val("nombre"),
                direccion: val("direccion"),
                detalle: detalle,
                total: total,
                fecha: fecha,
                hora: hora,
                timestamp: Date.now()
            });

            document.querySelectorAll("input").forEach(i => i.value = "");
            document.getElementById("tipo").selectedIndex = 0;

        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "ENVIAR PEDIDO";
        }
    };

    window.finalizar = async (id) => {
        if(confirm("¿Quitar de la lista?")) {
            await deleteDoc(doc(db, "pedidos", id));
        }
    };
</script>
</body>
</html>
