<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chorigrill 🔥</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

h1 {
  text-align: center;
  color: orange;
  font-size: 32px;
}

.container {
  padding: 15px;
}

.bloque {
  background: #111;
  border: 2px solid orange;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  background: black;
  border: 2px solid orange;
  color: white;
  font-size: 16px;
}

select {
  width: 100%;
  padding: 12px;
  background: black;
  border: 2px solid orange;
  color: white;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
}

.enviar {
  background: orange;
  color: black;
}

.listo {
  background: green;
  color: white;
}

.cancelar {
  background: red;
  color: white;
}

ul {
  list-style: none;
  padding: 10px;
}

li {
  background: #111;
  border: 2px solid orange;
  margin: 10px 0;
  padding: 15px;
  border-radius: 10px;
}

.primero {
  background: orange;
  color: black;
}
</style>
</head>

<body>

<h1>🔥 Chorigrill</h1>

<div class="container">

<div class="bloque">
<p id="info"></p>
</div>

<div class="bloque">
<input id="nombre" placeholder="Nombre">
</div>

<div class="bloque">
<input id="direccion" placeholder="Dirección (opcional)">
</div>

<div class="bloque">
<input type="number" id="pechuga" placeholder="Pechuga">
<input type="number" id="carne" placeholder="Carne">
<input type="number" id="lomo" placeholder="Lomo">
<input type="number" id="sopa" placeholder="Sopa">
<input type="number" id="arroz" placeholder="Arroz">
</div>

<div class="bloque">
<input type="number" id="bebida" placeholder="Bebida (precio)">
</div>

<div class="bloque">
<select id="tipo">
  <option value="0">Aquí</option>
  <option value="3000">Para llevar (+ extra)</option>
</select>
</div>

<button class="enviar" onclick="agregarPedido()">Enviar Pedido</button>

</div>

<h2 style="text-align:center;">Pedidos</h2>
<ul id="lista"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
  authDomain: "chorigrill-9d0e9.firebaseapp.com",
  projectId: "chorigrill-9d0e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// número automático
async function generarNumero() {
  const snap = await getDocs(collection(db, "pedidos"));
  if (snap.empty) return 1;

  let max = 0;
  snap.forEach(d => {
    if (d.data().numero > max) max = d.data().numero;
  });

  return max + 1;
}

// agregar pedido
window.agregarPedido = async function() {
  const numero = await generarNumero();

  const ahora = new Date();
  const fecha = ahora.toLocaleDateString();
  const hora = ahora.toLocaleTimeString();

  const nombre = document.getElementById("nombre").value;
  const direccion = document.getElementById("direccion").value;

  const p = Number(document.getElementById("pechuga").value) || 0;
  const c = Number(document.getElementById("carne").value) || 0;
  const l = Number(document.getElementById("lomo").value) || 0;
  const s = Number(document.getElementById("sopa").value) || 0;
  const a = Number(document.getElementById("arroz").value) || 0;
  const bebida = Number(document.getElementById("bebida").value) || 0;
  const extra = Number(document.getElementById("tipo").value);

  const total =
    (p * 12000) +
    (c * 12000) +
    (l * 12000) +
    (s * 4000) +
    (a * 1000) +
    bebida +
    extra;

  await addDoc(collection(db, "pedidos"), {
    numero, nombre, direccion,
    total, fecha, hora
  });
};

// eliminar
window.eliminar = async function(id) {
  await deleteDoc(doc(db, "pedidos", id));
};

// tiempo real
onSnapshot(collection(db, "pedidos"), (snap) => {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let pedidos = [];

  snap.forEach(d => pedidos.push({ id: d.id, ...d.data() }));

  pedidos.sort((a,b)=>a.numero-b.numero);

  pedidos.forEach((p,i) => {
    lista.innerHTML += `
      <li class="${i===0?'primero':''}">
        <b>Pedido #${p.numero}</b><br>
        ${p.nombre || ''}<br>
        ${p.fecha} ${p.hora}<br>
        Total: $${p.total}<br><br>

        <button class="listo" onclick="eliminar('${p.id}')">Listo</button>
        <button class="cancelar" onclick="eliminar('${p.id}')">Cancelar</button>
      </li>
    `;
  });

  document.getElementById("info").innerText =
    pedidos.length ? "Siguiente pedido #" + (pedidos[pedidos.length-1].numero + 1)
                   : "Siguiente pedido #1";
});
</script>

</body>
</html>
