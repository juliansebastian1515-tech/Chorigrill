<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chorigrill V2 🔥</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; }
        .app-container { max-width: 450px; margin: auto; padding: 20px; }
        h1 { text-align: center; color: #ff9800; text-transform: uppercase; letter-spacing: 2px; }
        
        .form-group { margin-bottom: 10px; }
        input, select { 
            width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ff9800; 
            background: #1a1a1a; color: white; font-size: 16px; outline: none;
        }
        input:focus { border-color: #ffb74d; box-shadow: 0 0 8px #ff9800; }

        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 10px; 
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-enviar { background: #ff9800; color: #000; margin-top: 10px; }
        .btn-enviar:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        .pedido-card { 
            background: #111; border: 2px solid #ff9800; padding: 15px; 
            border-radius: 15px; margin-top: 20px; position: relative;
        }
        .pedido-header { border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; color: #ff9800; }
        .fila-item { display: flex; justify-content: space-between; font-size: 15px; margin: 4px 0; }
        .total-box { font-size: 18px; font-weight: bold; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
        
        .acciones { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-listo { background: #4caf50; color: white; padding: 10px; border-radius: 8px; border: none; font-weight: bold; }
        .btn-cancelar { background: #f44336; color: white; padding: 10px; border-radius: 8px; border: none; font-weight: bold; }
        
        .status-badge { background: #ff9800; color: black; font-size: 12px; padding: 2px 8px; border-radius: 4px; float: right; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🔥 Chorigrill</h1>
    
    <div class="form-group"><input type="text" id="inp-nombre" placeholder="Nombre del Cliente"></div>
    <div class="form-group"><input type="text" id="inp-direccion" placeholder="Dirección"></div>
    <div class="form-group"><input type="number" id="inp-pechuga" placeholder="Cantidad Pechuga" inputmode="numeric"></div>
    <div class="form-group"><input type="number" id="inp-carne" placeholder="Cantidad Carne" inputmode="numeric"></div>
    <div class="form-group"><input type="number" id="inp-lomo" placeholder="Cantidad Lomo" inputmode="numeric"></div>
    <div class="form-group"><input type="number" id="inp-sopa" placeholder="Cantidad Sopa" inputmode="numeric"></div>
    <div class="form-group"><input type="number" id="inp-arroz" placeholder="Cantidad Arroz" inputmode="numeric"></div>
    <div class="form-group"><input type="number" id="inp-bebida" placeholder="Precio Bebida" inputmode="numeric"></div>
    <div class="form-group">
        <select id="inp-tipo">
            <option value="0">Para comer aquí</option>
            <option value="3000">Para llevar (+3000)</option>
        </select>
    </div>

    <button id="main-btn" class="btn btn-enviar">REGISTRAR PEDIDO</button>

    <h2 style="margin-top: 30px; border-left: 4px solid #ff9800; padding-left: 10px;">Pedidos Activos</h2>
    <div id="lista-pedidos"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    // Tu Configuración (Asegúrate que estos datos coincidan con tu Firebase Console)
    const firebaseConfig = {
        apiKey: "AIzaSyCHB22bT5qYZGzLtqZgo1TtwSNNc-tjRtA",
        authDomain: "chorigrill-9d0e9.firebaseapp.com",
        projectId: "chorigrill-9d0e9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const pedidosRef = collection(db, "pedidos");

    let nroPedidoSiguiente = 1;

    // --- LÓGICA DE VISUALIZACIÓN ---
    onSnapshot(query(pedidosRef, orderBy("numero", "asc")), (snapshot) => {
        const contenedor = document.getElementById("lista-pedidos");
        contenedor.innerHTML = "";
        
        if (!snapshot.empty) {
            const ultDoc = snapshot.docs[snapshot.docs.length - 1].data();
            nroPedidoSiguiente = (ultDoc.numero || 0) + 1;
        }

        snapshot.forEach((documento) => {
            const data = documento.data();
            const id = documento.id;
            
            const card = document.createElement("div");
            card.className = "pedido-card";
            
            let itemsHtml = data.items.map(i => `
                <div class="fila-item">
                    <span>${i.cantidad}x ${i.nombre}</span>
                    <span>$${i.subtotal}</span>
                </div>
            `).join("");

            card.innerHTML = `
                <div class="pedido-header">
                    <span class="status-badge">NUEVO</span>
                    <b>#${data.numero}</b> | ${data.hora}
                </div>
                <div><b>Cliente:</b> ${data.cliente || 'Sin nombre'}</div>
                <div><b>Dir:</b> ${data.dir || 'En local'}</div>
                <div style="margin-top:10px;">${itemsHtml}</div>
                <div class="total-box">TOTAL: $${data.total}</div>
                <div class="acciones">
                    <button class="btn-listo" onclick="eliminarPedido('${id}')">LISTO</button>
                    <button class="btn-cancelar" onclick="eliminarPedido('${id}')">CANCELAR</button>
                </div>
            `;
            contenedor.appendChild(card);
        });
    });

    // --- LÓGICA DE ENVÍO ---
    document.getElementById("main-btn").addEventListener("click", async () => {
        const btn = document.getElementById("main-btn");
        
        // 1. Obtener valores
        const cliente = document.getElementById("inp-nombre").value;
        const dir = document.getElementById("inp-direccion").value;
        const pechuga = parseInt(document.getElementById("inp-pechuga").value) || 0;
        const carne = parseInt(document.getElementById("inp-carne").value) || 0;
        const lomo = parseInt(document.getElementById("inp-lomo")?.value) || 0;
        const sopa = parseInt(document.getElementById("inp-sopa").value) || 0;
        const arroz = parseInt(document.getElementById("inp-arroz").value) || 0;
        const bebida = parseInt(document.getElementById("inp-bebida").value) || 0;
        const extra = parseInt(document.getElementById("inp-tipo").value) || 0;

        // 2. Construir detalle del pedido
        const listaFinal = [];
        if(pechuga) listaFinal.push({ nombre: "Pechuga", cantidad: pechuga, subtotal: pechuga * 12000 });
        if(carne)   listaFinal.push({ nombre: "Carne", cantidad: carne, subtotal: carne * 12000 });
        if(lomo)    listaFinal.push({ nombre: "Lomo", cantidad: lomo, subtotal: lomo * 12000 });
        if(sopa)    listaFinal.push({ nombre: "Sopa", cantidad: sopa, subtotal: sopa * 4000 });
        if(arroz)   listaFinal.push({ nombre: "Arroz", cantidad: arroz, subtotal: arroz * 1000 });
        if(bebida)  listaFinal.push({ nombre: "Bebida", cantidad: 1, subtotal: bebida });
        if(extra)   listaFinal.push({ nombre: "Envío/Llevar", cantidad: 1, subtotal: extra });

        const totalFinal = listaFinal.reduce((sum, item) => sum + item.subtotal, 0);

        if(totalFinal === 0) return alert("El pedido está vacío");

        // 3. Bloquear interfaz
        btn.disabled = true;
        btn.innerText = "PROCESANDO...";

        try {
            const time = new Date();
            await addDoc(pedidosRef, {
                numero: nroPedidoSiguiente,
                cliente: cliente,
                dir: dir,
                items: listaFinal,
                total: totalFinal,
                hora: time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                timestamp: Date.now()
            });

            // 4. Limpiar Formulario
            document.querySelectorAll("input").forEach(i => i.value = "");
            document.getElementById("inp-tipo").selectedIndex = 0;
            
        } catch (error) {
            console.error(error);
            alert("Error de conexión con Firebase. Verifica tu internet.");
        } finally {
            // 5. IMPORTANTE: Desbloquear siempre
            btn.disabled = false;
            btn.innerText = "REGISTRAR PEDIDO";
        }
    });

    // --- FUNCIÓN PARA ELIMINAR ---
    window.eliminarPedido = async (id) => {
        if(confirm("¿Quitar pedido de la lista?")) {
            await deleteDoc(doc(db, "pedidos", id));
        }
    };
</script>

</body>
</html>
